<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}MBR Extractor{% endblock %}</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-2: #242836;
      --border: #2e3345;
      --text: #e4e6f0;
      --text-muted: #8b8fa3;
      --accent: #6c63ff;
      --accent-hover: #857eff;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --radius: 10px;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    header .logo {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    header .logo span { color: var(--text); }

    header nav a {
      color: var(--text-muted);
      text-decoration: none;
      margin-left: 1.5rem;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.2s;
    }
    header nav a:hover { color: var(--text); }

    h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 1.5rem; }
    h2 { font-size: 1.25rem; font-weight: 600; margin-bottom: 1rem; }
    h3 { font-size: 1rem; font-weight: 600; margin-bottom: 0.75rem; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: var(--accent); }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.7rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge.uploaded { background: #2563eb22; color: #60a5fa; }
    .badge.processing { background: #f59e0b22; color: #f59e0b; }
    .badge.completed { background: #22c55e22; color: #22c55e; }
    .badge.failed { background: #ef444422; color: #ef4444; }
    .badge.pending { background: #64748b22; color: #94a3b8; }

    .badge-review {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 600;
      background: #f59e0b22;
      color: #f59e0b;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    th, td {
      text-align: left;
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    th {
      font-weight: 600;
      color: var(--text-muted);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    tr:hover td { background: var(--surface-2); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1.1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
    .btn-sm { padding: 0.3rem 0.75rem; font-size: 0.78rem; }

    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 0.3rem;
      color: var(--text-muted);
    }

    input[type="file"], select {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem 0.75rem;
      color: var(--text);
      font-size: 0.85rem;
      width: 100%;
      font-family: var(--font);
    }

    .filter-bar {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-bar a { white-space: nowrap; }

    .json-block {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      overflow-x: auto;
      max-height: 400px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      color: #a5b4fc;
    }

    .page-image {
      max-width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .page-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 2rem;
      overflow: hidden;
    }
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
    }
    .page-body { padding: 1.5rem; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }

    .collapsible-toggle {
      cursor: pointer;
      user-select: none;
      color: var(--accent);
      font-weight: 500;
      font-size: 0.85rem;
    }
    .collapsible-toggle:hover { text-decoration: underline; }
    .collapsible-content { display: none; margin-top: 0.75rem; }
    .collapsible-content.open { display: block; }

    .error-text { color: var(--danger); font-size: 0.8rem; }
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }

    @media (max-width: 900px) {
      .grid-2 { grid-template-columns: 1fr; }
      .container { padding: 1rem; }
    }
  </style>
</head>
<body>
  <header>
    <a href="/review" class="logo">⚗️ <span>MBR Extractor</span></a>
    <nav>
      <a href="/review">Dashboard</a>
      <a href="/documents">API: Documents</a>
      <a href="/docs">API Docs</a>
    </nav>
  </header>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
  <script>
    function toggleCollapsible(id) {
      const el = document.getElementById(id);
      if (el) el.classList.toggle('open');
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
